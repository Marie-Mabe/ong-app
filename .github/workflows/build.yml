name: Build and Release Electron App

on:
  push:
    branches: [main] # Se déclenche automatiquement à chaque push sur main
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

jobs:
  build-windows:
    runs-on: windows-latest # Machine virtuelle Windows native

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 💡 CORRECTION : On passe en Node 22 pour satisfaire better-sqlite3
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Installe proprement sans modifier le package-lock.json

      - name: Build Application for Windows
        run: npm run dist:win # Génère le dossier portable contenant l'ASAR unpacked
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDEJ-LA-MOISSON-Windows-Portable
          path: out/CDEJ LA MOISSON-win32-x64/ # Téléverse le dossier complet fonctionnel

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # 💡 Alignement aussi sur Node 22 pour Linux
          cache: 'npm'
      - run: npm ci
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: out/make/**/*.deb