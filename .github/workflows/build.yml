name: Build

on:
  push:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: out/make/**/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/**/*.exe