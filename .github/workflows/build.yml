name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*' # Se déclenche lorsque vous poussez un tag version (ex: v1.0.0)
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'interface GitHub

jobs:
  release:
    runs-on: windows-latest # 💡 C'est ça la magie : on compile sur un VRAI Windows !

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Ajustez selon votre version locale de Node
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Installe proprement vos dépendances à partir du package-lock.json

      - name: Build Application for Windows
        run: npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDEJ-LA-MOISSON-Windows
          path: out/CDEJ LA MOISSON-win32-x64/ # Téléverse le dossier portable fonctionnel